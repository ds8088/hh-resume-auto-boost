suite: Secret test
templates:
  - secret.yaml
release:
  name: resume-boost

tests:
  - it: should render nothing if existingSecret is set
    set:
      credentials.existingSecret: test-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should render Secret with correct name and type
    asserts:
      - hasDocuments:
          count: 1
      - isAPIVersion:
          of: v1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: resume-boost-hh-resume-auto-boost-credentials
      - equal:
          path: type
          value: Opaque

  - it: should store a custom login
    set:
      credentials.login: "+78005553535"
    asserts:
      - equal:
          path: stringData.LOGIN
          value: "+78005553535"

  - it: should store a custom password
    set:
      credentials.password: Bash1234
    asserts:
      - equal:
          path: stringData.PASSWORD
          value: Bash1234

  - it: should have the standard chart labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: hh-resume-auto-boost
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: hh-resume-auto-boost
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: resume-boost
